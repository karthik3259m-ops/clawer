name: Batch PDF Scraper

on:
  workflow_dispatch: # Manual start

jobs:
  build:
    runs-on: ubuntu-latest
    # Required to allow the Action to push code back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Crawler
        run: python crawler.py
