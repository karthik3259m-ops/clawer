name: Scrape Papers
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright beautifulsoup4 playwright-stealth
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        run: python crawler.py

      # Note: The Python script handles the git push directly, 
      # but we ensure the environment is ready here.
